      property="og:description"

    <meta property="og:url" content="https://www.julien-nedellec.fr/" />

    <!-- Additional SEO -->

    <meta name="format-detection" content="telephone=no" />

    <!-- Security Headers (CSP via meta tag — configure also via HTTP headers on Traefik/Dokploy for frame-ancestors + HSTS) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://www.julien-nedellec.fr https://tnsinlwzvcacdhupxyfi.supabase.co https://garage-s3.j-ned.dev; connect-src 'self' https://tnsinlwzvcacdhupxyfi.supabase.co; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- DNS prefetch for S3 (used if direct S3 URLs are referenced) -->
    <link rel="dns-prefetch" href="https://garage-s3.j-ned.dev" />

    <!-- Preload des API critiques du home : le browser démarre la requête dès le parse HTML,
         avant l'évaluation JS. Quand Angular fait le fetch plus tard, il hit le preload cache. -->
    <link rel="preload" href="/api/home-bundle" as="fetch" type="application/json" />
    <link rel="preload" href="/api/settings" as="fetch" type="application/json" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="48x48" />
