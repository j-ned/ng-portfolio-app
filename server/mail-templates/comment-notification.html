<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau commentaire sur le blog</title>
</head>
<body style="margin:0;padding:0;background-color:#1e1e1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table role="presentation" style="width:100%;border-spacing:0;background-color:#1e1e1e;padding:40px 20px;">
<tr><td style="text-align:center;">
<table role="presentation" style="width:600px;max-width:600px;border-spacing:0;">
  <tr><td style="text-align:center;padding-bottom:24px;">
    <span style="color:#f8fafc;font-size:24px;font-weight:700;">Julien.N</span>
  </td></tr>
  <tr><td style="text-align:center;padding-bottom:24px;">
    <span style="background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;display:inline-block;">
      &#128172; Nouveau commentaire sur le blog
    </span>
  </td></tr>
  <tr><td style="background-color:#262629;border-radius:16px;overflow:hidden;">
    <table role="presentation" style="width:100%;border-spacing:0;">
      <tr><td style="height:4px;background:linear-gradient(90deg,#60a5fa,#a78bfa);font-size:0;line-height:0;">&nbsp;</td></tr>
      <tr><td style="padding:32px;">
        <p style="color:#94a3b8;font-size:14px;margin:0 0 24px;">Un nouveau commentaire a &#233;t&#233; post&#233; sur votre blog et n&#233;cessite une mod&#233;ration.</p>
        <!-- Details -->
        <table role="presentation" style="width:100%;border-spacing:0;margin-bottom:24px;">
          <tr>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;"><span style="color:#94a3b8;font-size:13px;">Article</span></td>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;text-align:right;"><span style="color:#f8fafc;font-size:14px;font-weight:500;">{{articleTitle}}</span></td>
          </tr>
          <tr>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;"><span style="color:#94a3b8;font-size:13px;">Auteur</span></td>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;text-align:right;"><span style="color:#f8fafc;font-size:14px;font-weight:500;">{{author}}</span></td>
          </tr>
          <tr>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;"><span style="color:#94a3b8;font-size:13px;">Email</span></td>
            <td style="padding:12px 16px;border-bottom:1px solid #334155;text-align:right;"><span style="color:#60a5fa;font-size:14px;">{{email}}</span></td>
          </tr>
        </table>
        <!-- Comment content -->
        <table role="presentation" style="width:100%;border-spacing:0;background-color:#1e293b;border-radius:12px;margin-bottom:24px;">
          <tr><td style="padding:20px;">
            <p style="color:#94a3b8;font-size:12px;text-transform:uppercase;margin:0 0 8px;">Commentaire</p>
            <p style="color:#f8fafc;font-size:14px;line-height:1.6;margin:0;white-space:pre-wrap;">{{content}}</p>
          </td></tr>
        </table>
        <!-- CTA -->
        <table role="presentation" style="width:100%;border-spacing:0;">
          <tr><td style="text-align:center;">
            <a href="{{frontendUrl}}/dashboard/comments" style="display:inline-block;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;padding:12px 32px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;">
              Mod&#233;rer les commentaires
            </a>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </td></tr>
  <tr><td style="text-align:center;padding-top:32px;">
    <p style="color:#475569;font-size:12px;margin:0;">&#169; 2026 Julien N&#233;dellec. Tous droits r&#233;serv&#233;s.</p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
