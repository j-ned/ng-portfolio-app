<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation de votre message</title>
</head>
<body style="margin:0;padding:0;background-color:#1e1e1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table role="presentation" style="width:100%;border-spacing:0;background-color:#1e1e1e;padding:40px 20px;">
<tr><td style="text-align:center;">
<table role="presentation" style="width:600px;max-width:600px;border-spacing:0;">
  <tr><td style="text-align:center;padding-bottom:24px;">
    <span style="color:#f8fafc;font-size:24px;font-weight:700;">Julien.N</span>
  </td></tr>
  <tr><td style="text-align:center;padding-bottom:24px;">
    <span style="background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;display:inline-block;">
      &#9989; Message bien reçu
    </span>
  </td></tr>
  <tr><td style="background-color:#262629;border-radius:16px;overflow:hidden;">
    <table role="presentation" style="width:100%;border-spacing:0;">
      <tr><td style="height:4px;background:linear-gradient(90deg,#60a5fa,#a78bfa);font-size:0;line-height:0;">&nbsp;</td></tr>
      <tr><td style="padding:32px;">
        <p style="color:#f8fafc;font-size:16px;margin:0 0 16px;">Bonjour {{name}},</p>
        <p style="color:#94a3b8;font-size:14px;line-height:1.6;margin:0 0 24px;">
          Merci pour votre message ! Je l'ai bien reçu et je vous répondrai dans les plus brefs délais.
        </p>
        <!-- Recap -->
        <table role="presentation" style="width:100%;border-spacing:0;background-color:#1e293b;border-left:3px solid #60a5fa;border-radius:8px;margin-bottom:24px;">
          <tr><td style="padding:20px;">
            <p style="color:#94a3b8;font-size:12px;text-transform:uppercase;margin:0 0 12px;">R&#233;capitulatif</p>
            <p style="color:#94a3b8;font-size:13px;margin:0 0 4px;">Sujet&#160;: <span style="color:#f8fafc;">{{subject}}</span></p>
          </td></tr>
        </table>
        <!-- Signature -->
        <table role="presentation" style="width:100%;border-spacing:0;border-top:1px solid #334155;">
          <tr><td style="padding-top:20px;">
            <p style="color:#f8fafc;font-size:14px;font-weight:600;margin:0;">Julien N&#233;dellec</p>
            <p style="color:#94a3b8;font-size:13px;margin:4px 0 0;">D&#233;veloppeur Full-Stack</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </td></tr>
  <tr><td style="text-align:center;padding-top:32px;">
    <p style="color:#475569;font-size:12px;margin:0;">&#169; 2026 Julien N&#233;dellec. Tous droits r&#233;serv&#233;s.</p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
