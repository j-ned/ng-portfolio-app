name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 — Qualité (feedback rapide sous 2 min)
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Lint + Format + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Déclenchement déploiement Dokploy (main seulement)
  # Attend que `quality` passe : un workflow vert = code déployé.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Dokploy
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Notify Dokploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::DOKPLOY_WEBHOOK_URL secret not set. Deployment skipped."
            exit 1
          fi
          HTTP_CODE=$(curl -fsSL -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Dokploy responded: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ] || exit 1
